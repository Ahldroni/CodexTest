<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ahldroni Mythic+ dashboard for GitHub Pages.">
    <title>Mythic+ Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-theme="midnight">
    <header class="site-header">
      <a class="brand" href="./" aria-label="Mythic+ dashboard home">
        <span class="brand__mark" aria-hidden="true">M+</span>
        <span>Ahldroni Dashboard</span>
      </a>
      <label class="top-select">
        <span>Season</span>
        <select id="season-select" disabled>
          <option>Loading seasons...</option>
        </select>
      </label>
    </header>

    <main id="app" class="dashboard" aria-live="polite">
      <section class="error-panel">
        <p class="eyebrow">Loading</p>
        <h1>Preparing Mythic+ dashboard</h1>
        <p>Fetching <code>data/seasons.json</code> and the current season snapshot.</p>
      </section>
    </main>

    <footer class="site-footer">
      <span id="status">Waiting for season data...</span>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
